name: Linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: 1 1 * * *

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Generate help
      run: dotnet run --project Sanara.Help/Sanara.Help.csproj
    - name: Publish Sanara
      run: dotnet publish -c Release -r linux-x64 -o Release Sanara/Sanara.csproj /p:DefineConstants=TRACE%3BNSFW_BUILD
    - name: Publish Sanara SFW version
      run: dotnet publish -c Release-SFW -r linux-x64 -o Release-SFW Sanara/Sanara.csproj /p:DefineConstants=TRACE
    - uses: actions/upload-artifact@v6
      with:
        name: Help
        path: ./Help.json
        retention-days: 2
    - uses: actions/upload-artifact@v6
      with:
        name: Sanara
        path: ./Release
        retention-days: 2
    - name: Test
      run: dotnet test --no-restore --verbosity normal --collect:"XPlat Code Coverage"
      env:
        VNDB_TOKEN: ${{ secrets.VNDB_TOKEN }}
        DANBOORU_APIKEY: ${{ secrets.DANBOORU_APIKEY }}
        DANBOORU_USERNAME: ${{ secrets.DANBOORU_USERNAME }}
    - name: Copy coverage
      run: sh copy_coverage.sh
    - name: Upload coverage to Codacy
      uses: codacy/codacy-coverage-reporter-action@master
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        coverage-reports: coverage.xml
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
